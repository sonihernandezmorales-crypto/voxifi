<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voxifi</title>

<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

<h1>🎤 Voxifi</h1>

<input type="file" id="videoInput" accept="video/*">

<video id="preview" controls></video>

<br><br>

<textarea id="text" placeholder="Escribe tu texto..."></textarea>

<br>

<!-- 🎤 20 VOCES REALES -->
<select id="voiceSelect">

<option value="es-MX-DaliaNeural">🇲🇽 Dalia</option>
<option value="es-MX-JorgeNeural">🇲🇽 Jorge</option>
<option value="es-MX-BeatrizNeural">🇲🇽 Beatriz</option>
<option value="es-MX-CarlosNeural">🇲🇽 Carlos</option>

<option value="es-ES-ElviraNeural">🇪🇸 Elvira</option>
<option value="es-ES-AlvaroNeural">🇪🇸 Álvaro</option>
<option value="es-ES-AbrilNeural">🇪🇸 Abril</option>
<option value="es-ES-EliasNeural">🇪🇸 Elías</option>

<option value="es-US-AriaNeural">🇺🇸 Aria</option>
<option value="es-US-GuyNeural">🇺🇸 Guy</option>
<option value="es-US-JennyNeural">🇺🇸 Jenny</option>

<option value="es-CO-SalomeNeural">🇨🇴 Salomé</option>
<option value="es-CO-GonzaloNeural">🇨🇴 Gonzalo</option>

<option value="es-AR-ElenaNeural">🇦🇷 Elena</option>
<option value="es-AR-TomasNeural">🇦🇷 Tomás</option>

<option value="fr-FR-DeniseNeural">🇫🇷 Denise</option>
<option value="de-DE-KatjaNeural">🇩🇪 Katja</option>
<option value="it-IT-ElsaNeural">🇮🇹 Elsa</option>
<option value="pt-BR-FranciscaNeural">🇧🇷 Francisca</option>

</select>

<br><br>

<audio id="audioPlayer" controls></audio>

<br><br>

<button onclick="generateAudio()">🔊 Generar audio</button>
<button onclick="downloadAudio()">⬇ Descargar audio</button>
<button onclick="exportVideo()">🚀 Exportar video</button>

<p id="status">Listo</p>

</div>

<script>

const video = document.getElementById("preview");
const audio = document.getElementById("audioPlayer");

/* cargar video */
document.getElementById("videoInput").addEventListener("change", function(e){
    video.src = URL.createObjectURL(e.target.files[0]);
});

/* generar audio */
async function generateAudio(){

document.getElementById("status").innerText = "⏳ Generando...";

const text = document.getElementById("text").value;
const voice = document.getElementById("voiceSelect").value;

await fetch("/audio", {
method: "POST",
headers: {"Content-Type":"application/x-www-form-urlencoded"},
body: "text=" + encodeURIComponent(text) + "&voice=" + encodeURIComponent(voice)
});

audio.src = "/audio-file?t=" + Date.now();
audio.load();

document.getElementById("status").innerText = "✔ Audio listo";
}

/* 🔥 SINCRONIZACIÓN PERFECTA */
video.addEventListener("play", () => {
    audio.currentTime = video.currentTime;
    audio.play();
});

video.addEventListener("pause", () => {
    audio.pause();
});

video.addEventListener("seeked", () => {
    audio.currentTime = video.currentTime;
});

video.addEventListener("timeupdate", () => {
    if (!video.paused) {
        const diff = Math.abs(audio.currentTime - video.currentTime);
        if (diff > 0.25) {
            audio.currentTime = video.currentTime;
        }
    }
});

/* descargar audio */
function downloadAudio(){
window.location.href = "/download-audio";
}

/* export video */
function exportVideo(){

document.getElementById("status").innerText = "⏳ Exportando...";

const file = document.getElementById("videoInput").files[0];

const formData = new FormData();
formData.append("video", file);
formData.append("text", document.getElementById("text").value);
formData.append("voice", document.getElementById("voiceSelect").value);

fetch("/upload", {
method: "POST",
body: formData
})
.then(r => r.blob())
.then(blob => {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "video_final.mp4";
    a.click();
    document.getElementById("status").innerText = "✔ Listo";
});
}

</script>

</body>
</html>
