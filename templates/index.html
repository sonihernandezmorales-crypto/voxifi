<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voxifi</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<meta name="theme-color" content="#0f172a">
</head>

<body>

<div class="container">

<h1>🎤 Voxifi</h1>

<input type="file" id="videoInput" accept="video/*">

<video id="preview" controls></video>

<textarea id="text" placeholder="Escribe tu texto..."></textarea>

<select id="voiceSelect">

<!-- 🇲🇽 MÉXICO -->
<option value="es-MX-DaliaNeural">🇲🇽 Dalia (Mujer)</option>
<option value="es-MX-JorgeNeural">🇲🇽 Jorge (Hombre)</option>
<option value="es-MX-BeatrizNeural">🇲🇽 Beatriz (Mujer)</option>
<option value="es-MX-CarlosNeural">🇲🇽 Carlos (Hombre)</option>

<!-- 🇪🇸 ESPAÑA -->
<option value="es-ES-ElviraNeural">🇪🇸 Elvira (Mujer)</option>
<option value="es-ES-AlvaroNeural">🇪🇸 Álvaro (Hombre)</option>
<option value="es-ES-AbrilNeural">🇪🇸 Abril (Mujer)</option>
<option value="es-ES-EliasNeural">🇪🇸 Elías (Hombre)</option>

<!-- 🇺🇸 ESPAÑOL USA -->
<option value="es-US-AriaNeural">🇺🇸 Aria (Mujer)</option>
<option value="es-US-GuyNeural">🇺🇸 Guy (Hombre)</option>
<option value="es-US-JennyNeural">🇺🇸 Jenny (Mujer)</option>

<!-- 🇨🇴 COLOMBIA -->
<option value="es-CO-SalomeNeural">🇨🇴 Salomé (Mujer)</option>
<option value="es-CO-GonzaloNeural">🇨🇴 Gonzalo (Hombre)</option>

<!-- 🇦🇷 ARGENTINA -->
<option value="es-AR-ElenaNeural">🇦🇷 Elena (Mujer)</option>
<option value="es-AR-TomasNeural">🇦🇷 Tomás (Hombre)</option>

<!-- 🇵🇪 PERÚ -->
<option value="es-PE-CamilaNeural">🇵🇪 Camila (Mujer)</option>
<option value="es-PE-AlexNeural">🇵🇪 Alex (Hombre)</option>

<!-- 🇻🇪 VENEZUELA -->
<option value="es-VE-PaolaNeural">🇻🇪 Paola (Mujer)</option>
<option value="es-VE-SebastianNeural">🇻🇪 Sebastián (Hombre)</option>

<!-- 🇨🇱 CHILE -->
<option value="es-CL-CatalinaNeural">🇨🇱 Catalina (Mujer)</option>

</select>

<audio id="audioPlayer" controls></audio>

<button onclick="generateAudio()">🔊 Generar audio</button>
<button onclick="downloadAudio()">⬇ Descargar audio</button>
<button onclick="exportVideo()">🚀 Exportar video</button>

<p id="status">Listo</p>

</div>

<script>

const video = document.getElementById("preview");
const audio = document.getElementById("audioPlayer");

/* preview video */
document.getElementById("videoInput").addEventListener("change", function(e){

    const file = e.target.files[0];

    if(file){
        video.src = URL.createObjectURL(file);
    }
});

/* generar audio */
async function generateAudio(){

    const text = document.getElementById("text").value;
    const voice = document.getElementById("voiceSelect").value;

    if(!text){
        alert("Escribe texto primero");
        return;
    }

    document.getElementById("status").innerText = "⏳ Generando audio...";

    try{

        const response = await fetch("/audio", {
            method: "POST",
            headers: {
                "Content-Type":"application/x-www-form-urlencoded"
            },
            body:
                "text=" + encodeURIComponent(text) +
                "&voice=" + encodeURIComponent(voice)
        });

        if(!response.ok){
            throw new Error("Error generando audio");
        }

        audio.src = "/audio-file?t=" + Date.now();
        audio.load();

        document.getElementById("status").innerText = "✔ Audio listo";

    }catch(error){
        console.error(error);
        document.getElementById("status").innerText = "❌ Error";
    }
}

/* sincronización */
video.addEventListener("play", () => {
    audio.currentTime = video.currentTime;
    audio.play();
});

video.addEventListener("pause", () => {
    audio.pause();
});

video.addEventListener("seeked", () => {
    audio.currentTime = video.currentTime;
});

/* descargar audio */
function downloadAudio(){
    window.location.href = "/download-audio";
}

/* exportar video */
async function exportVideo(){

    const file = document.getElementById("videoInput").files[0];
    const text = document.getElementById("text").value;
    const voice = document.getElementById("voiceSelect").value;

    if(!file){
        alert("Sube un video primero");
        return;
    }

    document.getElementById("status").innerText = "⏳ Exportando video...";

    const formData = new FormData();

    formData.append("video", file);
    formData.append("text", text);
    formData.append("voice", voice);

    try{

        const response = await fetch("/upload", {
            method: "POST",
            body: formData
        });

        if(!response.ok){
            throw new Error("Error exportando video");
        }

        const blob = await response.blob();

        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "video_final.mp4";
        a.click();

        document.getElementById("status").innerText = "✔ Video exportado";

    }catch(error){
        console.error(error);
        document.getElementById("status").innerText = "❌ Error exportando";
    }
}

</script>

</body>
</html>
